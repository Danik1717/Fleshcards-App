<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards App</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; background-color: #f4f7f6; }
        section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        /* Card Styles */
        .card-display {
            width: 100%; max-width: 400px; height: 250px;
            margin: 20px auto; perspective: 1000px; cursor: pointer;
        }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            text-align: center; transition: transform 0.6s;
            transform-style: preserve-3d; border: 2px solid #333; border-radius: 15px;
        }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex;
            align-items: center; justify-content: center;
            font-size: 1.5rem; padding: 20px; box-sizing: border-box;
        }
        .card-back { background: #e8f5e9; transform: rotateY(180deg); }
        .card-front { background: #fff; }

        .controls { text-align: center; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #eee; }
        .btn-del { color: red; cursor: pointer; border: none; background: none; }
        .btn-edit { color: blue; cursor: pointer; border: none; background: none; margin-right: 10px; }
    </style>
</head>
<body>

    <h2>Управление колодами</h2>
    <section>
        <select id="deckSelect" onchange="switchDeck()"></select>
        <button onclick="addDeck()">+ Новая колода</button>
    </section>

    <h2>Добавить карточку</h2>
    <section>
        <div class="input-group">
            <input type="text" id="frontInput" placeholder="Лицевая сторона (вопрос)">
            <input type="text" id="backInput" placeholder="Оборотная сторона (ответ)">
            <button onclick="saveCard()">Сохранить</button>
        </div>
    </section>

    <h2>Изучение</h2>
    <section id="studySection">
        <div>
            <label><input type="checkbox" id="unlearnedOnly" onchange="initStudy()"> Только невыученные</label>
            <button onclick="shuffleDeck()">Перемешать</button>
        </div>
        
        <div class="card-display" onclick="toggleFlip()">
            <div class="card-inner" id="cardInner">
                <div class="card-front" id="cardFront">Колода пуста</div>
                <div class="card-back" id="cardBack">---</div>
            </div>
        </div>

        <div class="controls">
            <button id="prevBtn" onclick="changeCard(-1)">⬅ Назад</button>
            <span id="counter">0 / 0</span>
            <button id="nextBtn" onclick="changeCard(1)">Вперед ➡</button>
        </div>
    </section>

    <h2>Список карточек</h2>
    <section>
        <table>
            <thead>
                <tr>
                    <th>Лицо</th>
                    <th>Оборот</th>
                    <th>Выучено</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </section>

    <script src="main.js"></script>
</body>
</html>
